<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetChurnShield</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="src/css/styles.css">
</head>
<body class="text-[#0F172A] antialiased">

    <header class="fixed top-0 left-0 right-0 z-50 p-4">
        <div class="flex items-center justify-between bg-slate-950 rounded-full px-4 py-2">
            <img src="logo.jpg" class="h-8">
            <nav class="hidden md:flex gap-6 text-xs text-gray-200">
                <a href="#pricing">Pricing</a>
            </nav>
            <a href="#signup-section" class="bg-white text-xs font-bold px-4 py-2 rounded-full">Secure Spot</a>
        </div>
    </header>

    <main class="pt-32 max-w-4xl mx-auto px-4">
        <section id="pricing" class="flex flex-col md:flex-row gap-6 items-stretch">
            <div class="flex-1 flex flex-col bg-gray-50 p-6 rounded-2xl">
                <h3 class="font-bold">DIY Churn Rescue</h3>
                <p class="text-xs text-gray-500 mb-4">You create the video.</p>
                <div class="mt-auto">
                    <a href="#signup-section" class="block bg-slate-950 text-white py-2 rounded-xl text-center text-xs">Get DIY Access</a>
                </div>
            </div>
            <div class="flex-1 flex flex-col border-2 border-blue-600 p-6 rounded-2xl">
                <h3 class="font-bold text-blue-600">Done-For-You</h3>
                <p class="text-xs text-gray-500 mb-4">We handle everything.</p>
                <div class="mt-auto">
                    <a href="#signup-section" class="block bg-blue-600 text-white py-2 rounded-xl text-center text-xs">Request Setup</a>
                </div>
            </div>
        </section>
    </main>

    <script src="src/js/main.js"></script>
</body>
</html>
