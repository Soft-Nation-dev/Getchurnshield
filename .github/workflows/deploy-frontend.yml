name: Deploy Frontend to Pages

on:
  push:
    branches: [ main ]  # change to 'master' if that's your branch
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

      - name: Copy build to root
        run: |
          rm -rf root_temp
          mkdir root_temp
          cp -r frontend/dist/* root_temp/  # use 'dist' instead of 'build' for Vite
          cp -r backend root_temp/           # keep backend in repo if needed
          rm -rf .git
          mv root_temp/* .
          rm -rf root_temp

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          force_orphan: true